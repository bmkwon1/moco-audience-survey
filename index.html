// Save full scores for every respondent
function sbInsert(cluster, scores, cb) {
  var payload = { cluster: cluster, sd: scores.SD||0, ee: scores.EE||0, sa: scores.SA||0, pvp: scores.PVP||0, hc: scores.HC||0, nar: scores.NAR||0, col: scores.COL||0, sol: scores.SOL||0 };
  fetch(SUPABASE_URL + "/rest/v1/" + TABLE, {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Prefer": "return=minimal" },
    body: JSON.stringify(payload)
  }).then(function(r){ cb(r.ok?null:"insert error"); }).catch(function(e){ cb(e); });
}

// Fetch all rows and sum every score column
function sbFetch(cb) {
  fetch(SUPABASE_URL + "/rest/v1/" + TABLE + "?select=cluster,sd,ee,sa,pvp,hc,nar,col,sol", {
    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
  }).then(function(r){ return r.json(); }).then(function(rows){
    var total = rows.length;
    var topCounts = {};   // how many people's TOP cluster was X
    var sumScores = { SD:0, EE:0, SA:0, PVP:0, HC:0, NAR:0, COL:0, SOL:0 };
    rows.forEach(function(r){
      topCounts[r.cluster] = (topCounts[r.cluster]||0) + 1;
      sumScores.SD  += r.sd  || 0;
      sumScores.EE  += r.ee  || 0;
      sumScores.SA  += r.sa  || 0;

      sumScores.HC  += r.hc  || 0;
      sumScores.NAR += r.nar || 0;
      sumScores.COL += r.col || 0;
      sumScores.SOL += r.sol || 0;
    });
    cb(null, { total: total, topCounts: topCounts, sumScores: sumScores });
  }).catch(function(e){ cb(e, null); });
}

function calcResult(answers) {
  var s = {SD:0,EE:0,SA:0,PVP:0,HC:0,NAR:0,COL:0,SOL:0};
  answers.forEach(function(a){ if(a) Object.keys(a.scores).forEach(function(k){ s[k]=(s[k]||0)+a.scores[k]; }); });
  if(s.PVP>=3) return { primary:"PVP", secondary:null, tertiary:null, scores:s };
  var sorted = clusterOrder.filter(function(k){return k!=="PVP";}).map(function(k){return{key:k,val:s[k]};}).sort(function(a,b){return b.val-a.val;});
  var top=sorted[0], sec=sorted[1], tert=sorted[2];
  var blend = top.val>0 && sec.val>0 && top.val-sec.val<=1;
  return { primary:top.key, secondary:(sec.val>0?sec.key:null), tertiary:(tert&&tert.val>0?tert.key:null), scores:s };
}

function render() {
  var app=document.getElementById("app");

  if(state.screen==="result") { app.innerHTML=renderResult(); bindResult(); stopModRefresh();  return; }
}

function renderIntro() {
  return '<div class="center"><div class="wrap-center">'

    +'<p class="subtitle">8 quick questions. Find out which player profile fits you best.</p>'
    +'<button class="btn-primary" id="startBtn">Find My Player Profile</button>'
    +'<p class="hint">About 90 seconds. No login required.</p>'
    +'</div></div>';
}
function bindIntro() {
  document.getElementById("startBtn").onclick = function(){
    state.screen="survey"; state.current=0; state.answers=new Array(8).fill(null); state.selected=null; render();
  };
  document.getElementById("modTap").onclick = function(){
    modTaps++; clearTimeout(modTapTimer);
    modTapTimer = setTimeout(function(){modTaps=0;},3000);
    if(modTaps>=5){modTaps=0; state.screen="mod"; render();}
  };
}

function renderSurvey() {
  var q=questions[state.current];
  var pct=Math.round((state.current/questions.length)*100);
  var opts=q.options.map(function(o,i){
    var sel=state.selected===o?" selected":"";
    return '<button class="opt-btn'+sel+'" data-idx="'+i+'">'+o.label+'</button>';
  }).join("");
  var nc=state.selected?" active":"";
  var nl=state.current===questions.length-1?"See My Profile":"Next";
  return '<div class="center"><div class="wrap">'
    +'<div class="progress-row"><span class="progress-label">Question '+(state.current+1)+' of '+questions.length+'</span><span class="progress-label">'+pct+'%</span></div>'
    +'<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>'
    +'<h2>'+q.text+'</h2>'
    +'<div class="options">'+opts+'</div>'
    +'<div class="nav-row"><button class="btn-back" id="backBtn">Back</button><button class="btn-next'+nc+'" id="nextBtn">'+nl+'</button></div>'
    +'</div></div>';
}
function bindSurvey() {
  var q=questions[state.current];
  document.querySelectorAll(".opt-btn").forEach(function(btn,i){
    btn.onclick=function(){state.selected=q.options[i]; render();};
  });
  document.getElementById("backBtn").onclick=function(){
    if(state.current===0){state.screen="intro";render();return;}
    state.current--; state.selected=state.answers[state.current]; render();
  };
  document.getElementById("nextBtn").onclick=function(){
    if(!state.selected) return;
    state.answers[state.current]=state.selected;
    if(state.current<questions.length-1){
      state.current++; state.selected=state.answers[state.current]||null; render();
    } else {
      state.result=calcResult(state.answers);
      state.screen="result";
      sbInsert(state.result.primary, state.result.scores, function(err){
        if(err) console.warn("Save error:",err);
      });
      render();
    }
  };
}

function renderResult() {
  var r=state.result, p=profiles[r.primary];
  var s=r.secondary?profiles[r.secondary]:null;
  var t=r.tertiary?profiles[r.tertiary]:null;
  var allScores = clusterOrder.map(function(k){return{key:k,val:r.scores[k]||0,pr:profiles[k]};}).filter(function(x){return x.val>0;}).sort(function(a,b){return b.val-a.val;});
  var maxScore = allScores.length>0?allScores[0].val:1;

  var secBlock = s ? '<div class="secondary-card" style="border:2px solid '+s.color+'">'
    +'<div class="secondary-label" style="color:'+s.color+'">Strong secondary profile</div>'
    +'<div class="secondary-name-row"><span style="font-size:20px">'+s.emoji+'</span><span style="color:white;font-weight:700;font-size:16px">'+s.name+'</span></div>'
    +'<p>'+s.description+'</p></div>' : "";

  var tertBlock = t ? '<div class="secondary-card" style="border:1px solid '+t.color+';opacity:0.85">'
    +'<div class="secondary-label" style="color:'+t.color+'">Notable tertiary motivation</div>'
    +'<div class="secondary-name-row"><span style="font-size:20px">'+t.emoji+'</span><span style="color:white;font-weight:700;font-size:16px">'+t.name+'</span></div>'
    +'<p>'+t.description+'</p></div>' : "";

  var bars = allScores.map(function(x){
    var w = Math.min(100, (x.val/maxScore)*100).toFixed(1);
    return '<div class="bar-row">'
      +'<span style="font-size:16px;min-width:24px">'+x.pr.emoji+'</span>'
      +'<span class="bar-name">'+x.pr.name+'</span>'
      +'<div class="bar-bg"><div class="bar-fill" style="background:'+x.pr.color+';width:'+w+'%"></div></div>'
      +'<span class="bar-val">'+x.val.toFixed(1)+'</span>'
      +'</div>';
  }).join("");

  return '<div style="min-height:100vh;background:#0f0f0f;padding:28px 20px;">'
    +'<div class="wrap" style="margin:0 auto;">'
    +'<div class="result-hero" style="background:'+p.color+'">'
    +'<div class="big-emoji">'+p.emoji+'</div>'
    +'<div class="profile-label">Your Primary Profile</div>'
    +'<h2>'+p.name+'</h2>'
    +'<p class="tagline">"'+p.tagline+'"</p>'
    +'<p class="desc">'+p.description+'</p></div>'
    +secBlock+tertBlock
    +'<div class="card"><div class="card-label">How mo.co is built for you</div><p>'+p.fit+'</p></div>'
    +'<div class="card"><div class="card-label">Your player traits</div><div class="traits">'
    +p.traits.map(function(t){return '<span class="trait-tag" style="background:'+p.light+';color:'+p.color+'">'+t+'</span>';}).join("")
    +'</div></div>'
    +(allScores.length>1?'<div class="card"><div class="card-label">Your full motivation breakdown</div>'+bars+'</div>':"")
    +'<button class="btn-retake" id="retakeBtn">Retake Survey</button>'
    +'</div></div>';
}
function bindResult(){
  document.getElementById("retakeBtn").onclick=function(){state.screen="intro";state.result=null;render();};
}

// ── MODERATOR ───────────────────────────────────────────────────────
function renderMod() {
  return '<div class="mod-wrap" id="modContent">'
    +'<div style="color:#888;font-size:14px;text-align:center;padding:60px 0;">Loading results...</div>'
    +'</div>';
}
function bindMod() { refreshModContent(); }

function refreshModContent() {
  sbFetch(function(err, data) {
    var el=document.getElementById("modContent");
    if(!el) return;
    if(err||!data) {
      el.innerHTML='<div style="color:#c62828;padding:20px;text-align:center;">Could not load results. Check your connection.</div>';
      return;
    }

    var total=data.total;
    var topCounts=data.topCounts;
    var sumScores=data.sumScores;

    // Sort all 8 clusters by aggregated score descending
    var sorted = clusterOrder.map(function(k){
      return { key:k, sum:sumScores[k]||0, avg:total>0?(sumScores[k]||0)/total:0, pr:profiles[k] };
    }).sort(function(a,b){return b.sum-a.sum;});

    var maxSum = sorted.length>0 && sorted[0].sum>0 ? sorted[0].sum : 1;

    // Group motivation profile summary (top 3 by aggregate score)
    var groupTop = sorted[0], groupSec = sorted[1], groupTert = sorted[2];

    var groupHero = total>0 ? (
      '<div class="group-hero" style="background:'+groupTop.pr.color+'">'
      +'<div class="group-hero-label">Group\'s Dominant Motivation</div>'
      +'<h2>'+groupTop.pr.emoji+' '+groupTop.pr.name+'</h2>'
      +'<p>"'+groupTop.pr.tagline+'"</p>'
      +'</div>'
      +'<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">'
      +'<div style="flex:1;min-width:140px;background:#1a1a1a;border-radius:10px;padding:14px;border-left:3px solid '+groupSec.pr.color+'">'
      +'<div style="color:#888;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Secondary</div>'
      +'<div style="font-size:14px;font-weight:700;">'+groupSec.pr.emoji+' '+groupSec.pr.name+'</div>'
      +'</div>'
      +'<div style="flex:1;min-width:140px;background:#1a1a1a;border-radius:10px;padding:14px;border-left:3px solid '+groupTert.pr.color+'">'
      +'<div style="color:#888;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Tertiary</div>'
      +'<div style="font-size:14px;font-weight:700;">'+groupTert.pr.emoji+' '+groupTert.pr.name+'</div>'
      +'</div>'
      +'</div>'
    ) : "";

    // Full aggregated score bars
    var bars = sorted.map(function(item, idx) {
      var pr=item.pr;
      var barW=((item.sum/maxSum)*100).toFixed(1);
      var isTarget=TARGET.indexOf(item.key)>-1;
      var topCount=topCounts[item.key]||0;
      var topPct=total>0?Math.round(topCount/total*100):0;
      var rankLabel="";
      if(idx===0) rankLabel='<span class="rank-label rank-1">1st</span>';
      else if(idx===1) rankLabel='<span class="rank-label rank-2">2nd</span>';
      else if(idx===2) rankLabel='<span class="rank-label rank-3">3rd</span>';

      return '<div class="mod-row">'
        +'<div class="mod-row-top">'
        +'<div class="mod-name-row">'
        +'<span style="font-size:16px">'+pr.emoji+'</span>'
        +'<span class="mod-name '+(isTarget?"target":"other")+'">'+pr.name+'</span>'
        +(isTarget?'<span class="target-badge">TARGET</span>':"")
        +rankLabel
        +'</div>'
        +'<div class="mod-score-info">'
        +'<span class="mod-avg">avg '+item.avg.toFixed(2)+' | #1 for '+topCount+' people ('+topPct+'%)</span>'
        +'<span class="mod-total-score">'+item.sum.toFixed(1)+'</span>'
        +'</div>'
        +'</div>'
        +'<div class="mod-bar-bg"><div class="mod-bar-fill" style="background:'+pr.color+';width:'+barW+'%"></div></div>'
        +'</div>';
    }).join("");

    // Target cluster breakdown
    var targetRows = TARGET.map(function(k){
      var pr=profiles[k];
      var item=sorted.filter(function(x){return x.key===k;})[0];
      var topCount=topCounts[k]||0;
      var topPct=total>0?Math.round(topCount/total*100):0;
      var scoreShare=total>0?(item.sum/Object.values(sumScores).reduce(function(a,b){return a+b;},0.001)*100).toFixed(1):0;
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2a2a2a;flex-wrap:wrap;gap:6px;">'
        +'<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:16px">'+pr.emoji+'</span><span style="color:white;font-weight:600;font-size:14px">'+pr.name+'</span></div>'
        +'<div style="display:flex;gap:20px;align-items:center;">'
        +'<div style="text-align:center;"><div style="color:'+pr.color+';font-size:18px;font-weight:700;">'+topPct+'%</div><div style="color:#666;font-size:10px;">top cluster</div></div>'
        +'<div style="text-align:center;"><div style="color:white;font-size:18px;font-weight:700;">'+scoreShare+'%</div><div style="color:#666;font-size:10px;">of total motivation</div></div>'
        +'</div></div>';
    }).join("");

    el.innerHTML = '<div class="mod-header">'
      +'<div><h1>Moderator Dashboard</h1><div class="mod-sub"><span class="status-dot"></span>Live — refreshes every 3 seconds</div></div>'
      +'<div class="mod-btns">'
      +'<button class="btn-mod-back" id="modBackBtn">Back to Survey</button>'
      +'<button class="btn-mod-clear" id="modClearBtn">Reset All Data</button>'
      +'</div></div>'

      +'<div class="mod-total"><div class="tot-label">Total Responses</div><div class="tot-num">'+total+'</div></div>'

      + (total>0 ? groupHero : "")

      +(total>0?
        '<div class="mod-card">'
        +'<div class="mod-card-label">Full Group Motivation Landscape</div>'
        +'<div class="mod-card-sub">Scores are the sum of every person\'s raw motivation score for each cluster — not just who came first. A high bar means this motivation is strongly present across the group, even for people whose primary cluster is different.</div>'
        +bars+'</div>'
      :"")

      +(total>0?
        '<div class="mod-card">'
        +'<div class="mod-card-label">Target Cluster Breakdown</div>'
        +'<div class="mod-card-sub">Two views per cluster: % of people who landed here as their top profile, and % share of total group motivation score.</div>'
        +targetRows+'</div>'
      :"");

    document.getElementById("modBackBtn").onclick=function(){state.screen="intro";render();};
    document.getElementById("modClearBtn").onclick=function(){
      if(confirm("Reset all survey data? This cannot be undone.")){
        sbDeleteAll(function(err){
          if(err) alert("Could not reset. Try again.");
          else refreshModContent();
        });
      }
    };
  });
}

function startModRefresh(){ stopModRefresh(); modInterval=setInterval(refreshModContent,3000); }
function stopModRefresh(){ if(modInterval){clearInterval(modInterval);modInterval=null;} }

render();
</script>
</body>
</html>
